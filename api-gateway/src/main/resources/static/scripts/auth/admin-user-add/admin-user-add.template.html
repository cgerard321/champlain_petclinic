<link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css"
      integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="/css/vets/form.css" rel="stylesheet" type="text/css"/>

<div class="bg-light">
    <div class="container">
        <div class="py-5 text-center"/>
        <h2 class="titleVetForm" id="title">New User Creation</h2>
        <p class="lead">Select the type of user you want to create</p>
    </div>
    <div class="container">
        <div class="py-5 text-center"/>
        <div class="row g-5">
            <div class="col-md-7 col-lg-12">
                <form enctype="multipart/form-data" id="userNew" name="userNew">
                    <div class="row g-3">
                        <select class="form-select" id="userType" name="userType" required>
                            <option value="">--Please choose an option--</option>
                            <option value="vetsNew">Veterinarian</option>
                            <option value="ownerForm">Pet Owner</option>
                            <option value="receptionistForm">Receptionist</option>
                            <option value="managerForm">Manager</option>

                        </select>
                        <div class="col-sm-6">
                            <button class="btn btn-primary" type="submit">Proceed in user creation</button>
                        </div>


                        </div>
                        <hr class="my-4"/>

                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .loader {
        border: 8px solid #f3f3f3;
        border-top: 8px solid #005d9a;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
