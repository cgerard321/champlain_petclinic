events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    
    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    # Resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s;

    server {
        listen       8080;
        server_name  localhost;
        
        # Root directory for AngularJS static files
        root   /usr/share/nginx/html;
        index  index.html;

        # Handle AngularJS routing - all routes should serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Handle API calls - proxy to backend services (with fallback)
        location /api/ {
            # Try to proxy to API Gateway, fallback to 503 if unavailable
            set $api_gateway "api-gateway:8080";
            proxy_pass http://$api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 2s;
            proxy_send_timeout 2s;
            proxy_read_timeout 2s;
            
            # Fallback when API Gateway is not available
            error_page 502 503 504 = @api_fallback;
        }

        # Handle webjars (AngularJS libraries) - with fallback
        location /webjars/ {
            # Try to proxy to API Gateway, fallback to 503 if unavailable
            set $api_gateway "api-gateway:8080";
            proxy_pass http://$api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 2s;
            proxy_send_timeout 2s;
            proxy_read_timeout 2s;
            
            # Fallback when API Gateway is not available
            error_page 502 503 504 = @webjars_fallback;
        }

        # Fallback for API calls when backend is unavailable
        location @api_fallback {
            add_header Content-Type application/json;
            return 503 '{"error": "Service temporarily unavailable", "message": "API Gateway is not available"}';
        }

        # Fallback for webjars when backend is unavailable
        location @webjars_fallback {
            add_header Content-Type text/plain;
            return 503 'WebJars service temporarily unavailable';
        }

        # Static file caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}
